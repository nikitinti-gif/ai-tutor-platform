services:
  - type: web
    name: ai-tutor-platform
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: BOT_MODE
        value: webhook
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: WEBHOOK_SECRET
        sync: false
