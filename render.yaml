services:
  - type: web
    name: ai-tutor-platform
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: >-
      pip install -r requirements.txt &&
      curl -k "https://gu-st.ru/content/lending/russian_trusted_root_ca_pem.crt"
      -w "\n" >> $(python -m certifi)
    startCommand: python bot.py
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: BOT_MODE
        value: webhook
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: SYNTHETIC_GEMINI_WORKER_ENABLED
        value: "true"
      - key: SYNTHETIC_WORKER_INTERVAL_SECONDS
        value: "15"
      - key: SYNTHETIC_WORKER_MAX_ATTEMPTS
        value: "2"
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_MODEL
        value: mistral-small-latest
      - key: YANDEX_API_KEY
        sync: false
      - key: YANDEX_FOLDER_ID
        sync: false
      - key: YANDEX_MODEL
        value: yandexgpt/latest
      - key: GIGACHAT_AUTH_KEY
        sync: false
      - key: GIGACHAT_MODEL
        value: GigaChat-2-Pro
      - key: GIGACHAT_SCOPE
        value: GIGACHAT_API_PERS
      - key: QWEN_MODEL
        value: qwen3.6-35b-a3b
      - key: QWEN_PILOT_V2_ENABLED
        value: "false"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: KIMI_MODEL
        value: moonshotai/kimi-k2.6:free
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_MODEL
        value: MiniMax-M3
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
